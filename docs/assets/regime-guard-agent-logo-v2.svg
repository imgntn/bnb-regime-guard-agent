<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Regime Guard TWAK Agent Logo</title>
  <desc id="desc">A gold trophy shield with trading candlesticks, a cyan signal line, and chain links on a dark badge.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d2633"/>
      <stop offset="0.52" stop-color="#0e141c"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="278" y1="132" x2="752" y2="782" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.24" stop-color="#ffd45a"/>
      <stop offset="0.6" stop-color="#f0a915"/>
      <stop offset="1" stop-color="#9c5d00"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="331" y1="236" x2="716" y2="816" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2bc2d"/>
      <stop offset="1" stop-color="#7b4600"/>
    </linearGradient>
    <linearGradient id="cyan" x1="280" y1="598" x2="744" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#52f3ff"/>
      <stop offset="1" stop-color="#22b8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="392" fill="none" stroke="#28374a" stroke-width="24"/>
  <circle cx="512" cy="512" r="344" fill="none" stroke="#111b27" stroke-width="10"/>

  <g filter="url(#shadow)">
    <path d="M280 226h464v74c0 166-94 316-232 386C374 616 280 466 280 300v-74Z" fill="url(#gold)" stroke="#5d3500" stroke-width="22" stroke-linejoin="round"/>
    <path d="M326 276h372v25c0 132-72 252-186 318-114-66-186-186-186-318v-25Z" fill="#171d25" opacity="0.2"/>
    <path d="M264 281c-74 7-128 59-128 128 0 73 64 130 151 136" fill="none" stroke="url(#gold)" stroke-width="48" stroke-linecap="round"/>
    <path d="M760 281c74 7 128 59 128 128 0 73-64 130-151 136" fill="none" stroke="url(#gold)" stroke-width="48" stroke-linecap="round"/>
    <path d="M204 409c0-30 21-55 54-65" fill="none" stroke="#fff0a6" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <path d="M820 409c0-30-21-55-54-65" fill="none" stroke="#fff0a6" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <rect x="416" y="656" width="192" height="82" rx="32" fill="url(#goldDark)" stroke="#5d3500" stroke-width="18"/>
    <rect x="332" y="738" width="360" height="86" rx="34" fill="url(#gold)" stroke="#5d3500" stroke-width="20"/>
  </g>

  <g filter="url(#glow)">
    <path d="M322 565 427 470l89 62 184-198" fill="none" stroke="url(#cyan)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="322" cy="565" r="20" fill="#52f3ff"/>
    <circle cx="427" cy="470" r="20" fill="#52f3ff"/>
    <circle cx="516" cy="532" r="20" fill="#52f3ff"/>
    <circle cx="700" cy="334" r="20" fill="#52f3ff"/>
  </g>

  <g fill="#ffd65b" stroke="#5d3500" stroke-width="16" stroke-linejoin="round">
    <rect x="380" y="392" width="48" height="142" rx="18"/>
    <rect x="488" y="326" width="48" height="226" rx="18"/>
    <rect x="596" y="424" width="48" height="112" rx="18"/>
  </g>
  <g stroke="#fff2a8" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <path d="M404 350v42"/>
    <path d="M404 534v42"/>
    <path d="M512 282v44"/>
    <path d="M512 552v46"/>
    <path d="M620 382v42"/>
    <path d="M620 536v42"/>
  </g>

